<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>⬛ Pixel Battle</title>
  <!-- Используем надежный CDN -->
  <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
  <style>
    /* --- MINIMAL CSS FOR STABILITY --- */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0d0d14;--panel:rgba(13,13,22,0.95);--border:rgba(255,255,255,0.10);--accent:#7c6ff7;--txt:#e8e8f0;--dim:#a0a0b0}
    body{margin:0;height:100vh;overflow:hidden;font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--txt)}
    #canvas{position:absolute;top:0;left:0;display:block;cursor:crosshair}
    #hud{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--border);padding:10px 20px;border-radius:16px;z-index:100}
    .btn{padding:8px 20px;background:var(--accent);color:white;border:none;border-radius:8px;cursor:pointer;font-weight:bold}
    #status{font-size:0.8rem;color:var(--dim);margin-right:10px}
  </style>
</head>
<body>

<!-- HUD UI -->
<div id="hud">
  <span id="status">Loading...</span>
  <button class="btn" id="placeBtn">Place Pixel</button>
</div>

<!-- Canvas -->
<canvas id="canvas"></canvas>

<script>
'use strict';

/* ═══════════════════════════════════════════════════════════
   ПРАВИЛА РАБОТЫ:
   1. Нажми F12 (Консоль), если что-то не работает.
   2. Жестко обновись Ctrl+Shift+R на обоих ПК (очистка кэша).
   3. Убедись, что нет блокировщиков рекламы на втором ПК.
═══════════════════════════════════════════════════════════ */

const CONFIG = {
  BOARD_SIZE: 4096,
  CD_MS: 3000,
  ZOOM_SPEED: 0.1,
};

// --- СОСТОЯНИЕ ---
let ready = false;
let camZoom = 1, camPanX = 0, camPanY = 0;
let lastMouse = { x:0, y:0 };
let onCooldown = false;
let cdTimer = null;
let selectedPx = {x:-1, y:-1};

// --- DOM ---
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const placeBtn = document.getElementById('placeBtn');
const statusText = document.getElementById('status');

// --- CANVAS INIT ---
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  draw();
}
window.addEventListener('resize', resize);
resize();

// --- CAMERA HELPERS ---
function sToB(sx, sy) {
  return {
    x: (sx - camPanX) / camZoom,
    y: (sy - camPanY) / camZoom
  };
}
function bToS(bx, by) {
  return {
    x: bx * camZoom + camPanX,
    y: by * camZoom + camPanY
  };
}
function clamp() {
  const W = canvas.width, H = canvas.height;
  const BW = CONFIG.BOARD_SIZE * camZoom;
  const BH = CONFIG.BOARD_SIZE * camZoom;
  camPanX = Math.min(camPanX, W);
  camPanX = Math.max(camPanX, -BW);
  camPanY = Math.min(camPanY, H);
  camPanY = Math.max(camPanY, -BH);
}
function zoomAt(sx, sy, dir) {
  const f = dir > 0 ? 1 + CONFIG.ZOOM_SPEED : 1 - CONFIG.ZOOM_SPEED;
  const nz = Math.min(50, Math.max(0.05, camZoom * f));
  const bx = (sx - camPanX) / camZoom;
  const by = (sy - camPanY) / camZoom;
  camPanX = sx - bx * nz;
  camPanY = sy - by * nz;
  camZoom = nz;
  clamp();
}

// --- OFFSCREEN BUFFER ---
let bCanvas, bCtx, bRGB;

function initBoard() {
  if (typeof OffscreenCanvas === 'undefined') {
    bCanvas = document.createElement('canvas');
    bCanvas.width = bCanvas.height = CONFIG.BOARD_SIZE;
  } else {
    bCanvas = new OffscreenCanvas(CONFIG.BOARD_SIZE, CONFIG.BOARD_SIZE);
  }
  bCtx = bCanvas.getContext('2d', { alpha: false });
  bCtx.fillStyle = '#ffffff';
  bCtx.fillRect(0, 0, CONFIG.BOARD_SIZE, CONFIG.BOARD_SIZE);
  bRGB = new Uint8Array(CONFIG.BOARD_SIZE * CONFIG.BOARD_SIZE * 3).fill(255);
}

function writePixel(x, y, r, g, b) {
  if (x < 0 || x >= CONFIG.BOARD_SIZE || y < 0 || y >= CONFIG.BOARD_SIZE) return;
  const idx = (y * CONFIG.BOARD_SIZE + x) * 3;
  bRGB[idx] = r; bRGB[idx+1] = g; bRGB[idx+2] = b;
  
  // Рисуем на оффскрин буфере
  const img = bCtx.createImageData(1, 1);
  img.data[0]=r; img.data[1]=g; img.data[2]=b; img.data[3]=255;
  bCtx.putImageData(img, x, y);
  
  draw(); // Перерисовываем на main canvas
}

// --- DRAW LOOP ---
let rafPending = false;
function draw() {
  if (rafPending) return;
  rafPending = true;
  requestAnimationFrame(() => {
    rafPending = false;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.setTransform(camZoom, 0, 0, camZoom, camPanX, camPanY);
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(bCanvas, 0, 0);
    ctx.restore();
  });
}

// --- SOCKET.IO SETUP ---
const socket = io({ transports: ['websocket', 'polling'] });

socket.on('connect', () => {
  console.log('[Socket] Connected ✅');
  statusText.textContent = 'Connected';
  statusText.style.color = '#fff';
});
socket.on('disconnect', () => {
  console.log('[Socket] Disconnected ❌');
  statusText.textContent = 'Disconnected';
  statusText.style.color = 'red';
});
socket.on('error', (err) => {
  console.error('[Socket Error]', err);
  statusText.textContent = 'Error!';
});

// --- MESSAGE HANDLERS ---
socket.on('board:meta', () => {
  initBoard();
  statusText.textContent = 'Downloading Board...';
});

socket.on('board:load_via_rest', async ({ url }) => {
  try {
    const res = await fetch(url);
    const buf = await res.arrayBuffer();
    statusText.textContent = 'Decompressing...';
    const rgb = pako.inflate(new Uint8Array(buf));
    const id = bCtx.createImageData(CONFIG.BOARD_SIZE, CONFIG.BOARD_SIZE);
    for(let i=0; i<rgb.length; i+=3) {
      id.data[i*4]=rgb[i]; id.data[i*4+1]=rgb[i+1]; id.data[i*4+2]=rgb[i+2]; id.data[i*4+3]=255;
    }
    bCtx.putImageData(id, 0, 0);
    ready = true;
    resetView();
    statusText.textContent = 'Ready 🎨';
  } catch (e) {
    console.error(e);
    statusText.textContent = 'Load Failed';
  }
});

socket.on('pixel:update', (data) => {
  // 👇 ВАЖНО: Проверяем данные перед рисованием
  if(!ready) return;
  console.log('[PIXEL UPDATE] Received from server:', data);
  writePixel(data.x, data.y, data.r, data.g, data.b);
});

socket.on('pixel:accepted', (data) => {
  if(!ready) return;
  console.log('[PIXEL ACCEPTED] You placed:', data);
  writePixel(data.x, data.y, data.r, data.g, data.b);
  startCooldown(data.cooldownMs);
});

socket.on('pixel:rejected', ({reason, remaining}) => {
  console.log('[PIXEL REJECTED]', reason);
  const msg = reason === 'cooldown' ? `${(remaining/1000).toFixed(1)}s` : reason;
  alert(`Can't place: ${msg}`);
});

// --- INPUT LOGIC ---
function hexToRgb(h) {
  const r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(h);
  return r ? {r:parseInt(r[1],16),g:parseInt(r[2],16),b:parseInt(r[3],16)} : {r:255,g:255,b:255};
}

function placePixel(x, y) {
  if(!ready) { alert('Wait for board load'); return; }
  if(onCooldown) { alert('Cooldown active'); return; }
  
  const rgb = hexToRgb('#7c6ff7'); // Цвет можно сделать динамическим
  console.log('[SENDING] Emitting pixel:', x, y, rgb.r, rgb.g, rgb.b);
  socket.emit('pixel:place', { x: Math.floor(x), y: Math.floor(y), ...rgb });
}

// Click to Place
canvas.addEventListener('mousedown', e => {
  const pos = sToB(e.clientX, e.clientY);
  placePixel(pos.x, pos.y);
});

// Wheel Zoom
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  zoomAt(e.clientX, e.clientY, e.deltaY > 0 ? -1 : 1);
  draw();
});

// Buttons
placeBtn.addEventListener('click', () => {
  // Можно добавить ввод координат, если нужно, но click уже достаточен
});

// Keyboard
document.addEventListener('keydown', e => {
  if(e.key === '+' || e.key === '=') zoomAt(canvas.width/2, canvas.height/2, 1);
  if(e.key === '-' ) zoomAt(canvas.width/2, canvas.height/2, -1);
  if(e.key === 'r' ) resetView();
});

// Cooldown
function startCooldown(ms) {
  onCooldown = true;
  const end = Date.now() + ms;
  placeBtn.disabled = true;
  
  if(cdTimer) clearInterval(cdTimer);
  cdTimer = setInterval(() => {
    const rem = Math.max(0, end - Date.now());
    placeBtn.textContent = `${(rem/1000).toFixed(1)}s`;
    if(rem<=0) {
      clearInterval(cdTimer);
      onCooldown = false;
      placeBtn.disabled = false;
      placeBtn.textContent = 'Place Pixel';
    }
  }, 100);
}

function resetView() {
  camZoom = 1;
  camPanX = 0;
  camPanY = 0;
}

</script>
</body>
</html>
