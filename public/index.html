<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>⬛ Pixel Battle</title>
  <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    :root{
      --bg:      #0d0d14;
      --panel:   rgba(13,13,22,0.95);
      --border:  rgba(255,255,255,0.10);
      --accent:  #7c6ff7;
      --accent2: #9d98f9;
      --ok:      #6ff7a0;
      --err:     #f76f6f;
      --warn:    #f7c86f;
      --txt:     #e8e8f0;
      --dim:     #6a6a7c;
    }

    html,body{
      width:100%;height:100%;
      overflow:hidden;
      background:var(--bg);
      font-family:'Segoe UI',system-ui,sans-serif;
      color:var(--txt);
      user-select:none;
    }

    /* ── Canvas ─────────────────────────────────────── */
    #cv{
      position:fixed;inset:0;
      display:block;
      image-rendering:pixelated;
      image-rendering:crisp-edges;
      cursor:crosshair;
    }

    /* ── Top bar ────────────────────────────────────── */
    #bar{
      position:fixed;top:0;left:0;right:0;height:48px;
      background:var(--panel);
      border-bottom:1px solid var(--border);
      backdrop-filter:blur(14px);
      display:flex;align-items:center;
      gap:10px;padding:0 14px;
      z-index:200;
      pointer-events:none;
    }
    #bar>*{pointer-events:auto}

    #logo{
      font-size:.95rem;font-weight:800;
      letter-spacing:.08em;color:var(--accent2);
    }
    #logo span{color:#fff}

    .pill{
      display:flex;align-items:center;gap:4px;
      background:rgba(255,255,255,.04);
      border:1px solid var(--border);
      border-radius:5px;padding:3px 9px;
      font-size:.74rem;
      font-family:'Courier New',monospace;
      color:var(--dim);
    }
    .pill b{color:var(--txt);font-weight:600}

    #sp{flex:1}

    #ol{
      display:flex;align-items:center;
      gap:5px;font-size:.76rem;color:var(--dim);
    }
    .dot{
      width:7px;height:7px;border-radius:50%;
      background:var(--ok);
      animation:dp 2s ease-in-out infinite;
    }
    @keyframes dp{
      0%,100%{opacity:1;transform:scale(1)}
      50%{opacity:.4;transform:scale(.7)}
    }

    /* ── Cooldown ring (ПОДНИМАЕМ ВЫШЕ) ────────────────────── */
    #cdwrap{
      position:fixed;
      top: 120px;  /* Подняли выше от низа */
      left:50%;
      transform:translateX(-50%);
      display:flex;flex-direction:column;
      align-items:center;gap:8px;
      z-index:201;
      opacity:0;pointer-events:none;
      transition:opacity .2s;
    }
    #cdwrap.show{opacity:1}

    #cdr{position:relative;width:70px;height:70px} /* Увеличили */
    #cdr svg{width:70px;height:70px;transform:rotate(-90deg)}
    #cdr .tr{fill:none;stroke:rgba(255,255,255,.07);stroke-width:5}
    #cdr .ar{
      fill:none;stroke:var(--accent);
      stroke-width:6; /* Толще */
      stroke-linecap:round;
      stroke-dasharray:178; /* 2π×28.5 */
      stroke-dashoffset:178;
    }
    #cdn{
      position:absolute;inset:0;
      display:flex;align-items:center;justify-content:center;
      font-size:1.1rem; /* Крупнее */
      font-weight:800;
      color:var(--accent2);
      text-shadow:0 0 10px rgba(124,111,247,0.5);
    }
    #cdl{
      font-size:.75rem;color:var(--accent2);
      letter-spacing:.08em;text-transform:uppercase;
      font-weight:600;
    }

    /* ── Bottom panel ───────────────────────────────── */
    #panel{
      position:fixed;bottom:16px;left:50%;
      transform:translateX(-50%);
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:16px;
      backdrop-filter:blur(18px);
      padding:10px 16px;
      display:flex;align-items:center;gap:12px;
      z-index:200;
      box-shadow:0 8px 32px rgba(0,0,0,.6);
    }

    /* Palette */
    #palette{
      display:flex;gap:5px;
      flex-wrap:wrap;max-width:252px;
    }
    .sw{
      width:24px;height:24px;border-radius:5px;
      cursor:pointer;border:2px solid transparent;
      flex-shrink:0;
      transition:transform .12s,border-color .12s,box-shadow .12s;
    }
    .sw:hover{transform:scale(1.18)}
    .sw.on{
      border-color:#fff;
      box-shadow:0 0 0 2px var(--accent);
      transform:scale(1.22);
    }

    .vd{width:1px;height:36px;background:var(--border);flex-shrink:0}

    /* Custom color */
    #cpw{
      display:flex;flex-direction:column;
      align-items:center;gap:2px;flex-shrink:0;
    }
    #cp{
      width:32px;height:32px;
      border:2px solid var(--border);
      border-radius:6px;cursor:pointer;
      background:none;padding:2px;
    }
    #cp::-webkit-color-swatch-wrapper{padding:0}
    #cp::-webkit-color-swatch{border:none;border-radius:3px}
    #hl{font-size:.60rem;font-family:monospace;color:var(--dim)}

    /* Selected preview */
    #selbox{
      width:28px;height:28px;border-radius:6px;
      border:2px solid rgba(255,255,255,.25);
      flex-shrink:0;
    }

    /* Place button */
    #pbtn{
      padding:9px 22px;
      background:var(--accent);color:#fff;
      border:none;border-radius:9px;
      font-size:.88rem;font-weight:700;
      cursor:pointer;letter-spacing:.03em;
      white-space:nowrap;flex-shrink:0;
      transition:background .15s,transform .1s;
    }
    #pbtn:hover:not(:disabled){
      background:var(--accent2);transform:scale(1.04);
    }
    #pbtn:active:not(:disabled){transform:scale(.96)}
    #pbtn:disabled{
      background:#2a2a38;color:var(--dim);
      cursor:not-allowed;
    }

    /* ── Minimap ────────────────────────────────────── */
    #mmwrap{
      position:fixed;bottom:16px;right:16px;
      z-index:200;
      border:1px solid var(--border);
      border-radius:7px;overflow:hidden;
      box-shadow:0 8px 32px rgba(0,0,0,.6);
      cursor:crosshair;background:#111;
    }
    #mmc{
      display:block;width:120px;height:120px;
      image-rendering:pixelated;
    }

    /* ── Connection badge ───────────────────────────── */
    #conn{
      position:fixed;top:56px;left:14px;
      font-size:.70rem;padding:3px 9px;
      border-radius:20px;z-index:200;
      border:1px solid transparent;
      transition:all .3s;
    }
    #conn.ok {background:rgba(111,247,160,.1);border-color:var(--ok);color:var(--ok)}
    #conn.bad{background:rgba(247,111,111,.1);border-color:var(--err);color:var(--err)}
    #conn.mid{background:rgba(247,200,111,.1);border-color:var(--warn);color:var(--warn)}

    /* ── Toasts ─────────────────────────────────────── */
    #tc{
      position:fixed;top:56px;right:14px;
      display:flex;flex-direction:column;gap:6px;
      z-index:300;pointer-events:none;
    }
    .tt{
      padding:7px 13px;border-radius:6px;
      font-size:.78rem;
      background:var(--panel);
      border:1px solid var(--border);
      backdrop-filter:blur(10px);
      max-width:240px;
      animation:tin .2s ease forwards;
    }
    .tt.ok {border-color:var(--ok); color:var(--ok)}
    .tt.err{border-color:var(--err);color:var(--err)}
    .tt.inf{border-color:var(--accent);color:var(--accent2)}
    @keyframes tin{
      from{opacity:0;transform:translateX(14px)}
      to{opacity:1;transform:none}
    }

    /* ── Loading ────────────────────────────────────── */
    #ld{
      position:fixed;inset:0;background:var(--bg);
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      gap:16px;z-index:999;
      transition:opacity .4s;
    }
    #ld.out{opacity:0;pointer-events:none}
    #ld h2{font-size:1.6rem;color:var(--accent2);letter-spacing:.1em}
    #lbw{
      width:260px;height:4px;
      background:rgba(255,255,255,.07);
      border-radius:2px;overflow:hidden;
    }
    #lb{
      height:100%;width:0%;
      background:linear-gradient(90deg,var(--accent),var(--accent2));
      border-radius:2px;transition:width .3s ease;
    }
    #ls{font-size:.75rem;color:var(--dim)}

    /* ── Hover ghost (квадрат под курсором) ─────────── */
    #gh{
      position:fixed;pointer-events:none;z-index:99;
      border:1.5px solid rgba(255,255,255,.85);
      box-shadow:0 0 0 1px rgba(0,0,0,.5);
      display:none;
    }

    /* ── Help ───────────────────────────────────────── */
    #hbtn{
      position:fixed;top:56px;right:14px;
      width:28px;height:28px;border-radius:50%;
      background:var(--panel);
      border:1px solid var(--border);
      color:var(--dim);font-size:.8rem;
      cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      z-index:200;
    }
    #hp{
      position:fixed;top:92px;right:14px;
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:9px;
      backdrop-filter:blur(14px);
      padding:12px 15px;
      font-size:.74rem;color:var(--dim);
      line-height:2;z-index:200;
      display:none;
      box-shadow:0 8px 32px rgba(0,0,0,.6);
      min-width:190px;
    }
    #hp.on{display:block}
    #hp strong{color:var(--txt);display:inline-block;min-width:100px}
  </style>
</head>
<body>

<!-- Loading -->
<div id="ld">
  <h2>⬛ PIXEL BATTLE</h2>
  <div id="lbw"><div id="lb"></div></div>
  <div id="ls">Connecting…</div>
</div>

<!-- Top bar -->
<div id="bar">
  <div id="logo">⬛ PIXEL <span>BATTLE</span></div>
  <div class="pill">X <b id="hx">—</b></div>
  <div class="pill">Y <b id="hy">—</b></div>
  <div class="pill">Zoom <b id="hz">100%</b></div>
  <div class="pill">CD <b id="hcd">1.0s</b></div>
  <div id="sp"></div>
  <div id="ol">
    <div class="dot"></div>
    <span id="hon">—</span> online
  </div>
</div>

<!-- Canvas -->
<canvas id="cv"></canvas>

<!-- Hover ghost -->
<div id="gh"></div>

<!-- Cooldown ring (ПОДНЯЛИ ВЫШЕ) -->
<div id="cdwrap">
  <div id="cdr">
    <svg viewBox="0 0 70 70">
      <circle class="tr" cx="35" cy="35" r="28.5"/>
      <circle class="ar" cx="35" cy="35" r="28.5" id="cdarc"/>
    </svg>
    <div id="cdn">1.0</div>
  </div>
  <div id="cdl">COOLDOWN</div>
</div>

<!-- Bottom panel -->
<div id="panel">
  <div id="palette"></div>
  <div class="vd"></div>
  <div id="cpw">
    <input type="color" id="cp" value="#7c6ff7"/>
    <div id="hl">#7c6ff7</div>
  </div>
  <div class="vd"></div>
  <div id="selbox"></div>
  <button id="pbtn">▪ Place Pixel</button>
</div>

<!-- Minimap -->
<div id="mmwrap">
  <canvas id="mmc" width="120" height="120"></canvas>
</div>

<!-- Connection badge -->
<div id="conn" class="bad">● Disconnected</div>

<!-- Toasts -->
<div id="tc"></div>

<!-- Help -->
<button id="hbtn">?</button>
<div id="hp">
  <strong>Left click</strong>Place pixel<br>
  <strong>Right drag</strong>Pan<br>
  <strong>Scroll</strong>Zoom<br>
  <strong>Space+drag</strong>Pan<br>
  <strong>R</strong>Reset view<br>
  <strong>G</strong>Toggle grid<br>
  <strong>+/−</strong>Zoom keys<br>
</div>

<script>
'use strict';

/* ═══════════════════════════════════════════════════════════
   PIXEL BATTLE — 2048x2048, задержка 1 секунда
═══════════════════════════════════════════════════════════ */

// ─── Константы ──────────────────────────────────────────
const BSIZE    = 2048;  // Было 4096
const CD_MS    = 1000;  // Было 3000 (1 секунда)
const MIN_ZOOM = 0.05;
const MAX_ZOOM = 48;
const ZF       = 0.15;
const GRID_Z   = 6;
const MM_PX    = 120;
const CD_CIRC  = 2 * Math.PI * 28.5; // ≈ 179.07 (r=28.5)

// ─── Палитра ────────────────────────────────────────────
const PALETTE = [
  '#ffffff','#c0c0c0','#808080','#404040','#202020','#000000',
  '#ffa7d1','#e50000','#ff6900','#ffa500','#ffe600','#a06a42',
  '#7eed56','#00cc00','#00d3dd','#2450a4','#3f00ff','#811e9f',
  '#cf6ee4','#ff99aa','#00cc78','#7c6ff7','#46d160','#25c2e3',
];

// ─── DOM ────────────────────────────────────────────────
const cv      = document.getElementById('cv');
const ctx     = cv.getContext('2d', { alpha: false });
const mmc     = document.getElementById('mmc');
const mmx     = mmc.getContext('2d');
const ldDiv   = document.getElementById('ld');
const lb      = document.getElementById('lb');
const ls      = document.getElementById('ls');
const hx      = document.getElementById('hx');
const hy      = document.getElementById('hy');
const hz      = document.getElementById('hz');
const hcd     = document.getElementById('hcd');
const hon     = document.getElementById('hon');
const pbtn    = document.getElementById('pbtn');
const cpInput = document.getElementById('cp');
const hlLabel = document.getElementById('hl');
const selbox  = document.getElementById('selbox');
const cdWrap  = document.getElementById('cdwrap');
const cdArc   = document.getElementById('cdarc');
const cdNum   = document.getElementById('cdn');
const connBadge = document.getElementById('conn');
const gh      = document.getElementById('gh');
const hbtn    = document.getElementById('hbtn');
const hpanel  = document.getElementById('hp');

// ─── Camera ─────────────────────────────────────────────
const cam = { x: 0, y: 0, z: 1 };

function s2b(sx, sy) {
  return { x: (sx - cam.x) / cam.z, y: (sy - cam.y) / cam.z };
}
function b2s(bx, by) {
  return { x: bx * cam.z + cam.x, y: by * cam.z + cam.y };
}
function clampCam() {
  const W = cv.width, H = cv.height;
  const M = 60;
  const bw = BSIZE * cam.z, bh = BSIZE * cam.z;
  cam.x = Math.min(cam.x, W - M);
  cam.x = Math.max(cam.x, -bw + M);
  cam.y = Math.min(cam.y, H - M);
  cam.y = Math.max(cam.y, -bh + M);
}
function zoomAt(sx, sy, dir) {
  const f  = dir > 0 ? (1 + ZF) : 1 / (1 + ZF);
  const nz = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, cam.z * f));
  if (nz === cam.z) return;
  const bx = (sx - cam.x) / cam.z;
  const by = (sy - cam.y) / cam.z;
  cam.x = sx - bx * nz;
  cam.y = sy - by * nz;
  cam.z = nz;
  clampCam();
  hz.textContent = (cam.z * 100).toFixed(0) + '%';
}
function resetView() {
  const W = cv.width, H = cv.height, mg = 24;
  cam.z = Math.min((W - mg * 2) / BSIZE, (H - mg * 2) / BSIZE);
  cam.x = (W - BSIZE * cam.z) / 2;
  cam.y = (H - BSIZE * cam.z) / 2;
  hz.textContent = (cam.z * 100).toFixed(0) + '%';
}

// ─── Board buffer ────────────────────────────────────────
let bOC, bCtx, bRGB;

function initBoard() {
  bOC = (typeof OffscreenCanvas !== 'undefined')
    ? new OffscreenCanvas(BSIZE, BSIZE)
    : Object.assign(document.createElement('canvas'), { width: BSIZE, height: BSIZE });
  bCtx = bOC.getContext('2d', { alpha: false });
  bCtx.fillStyle = '#ffffff';
  bCtx.fillRect(0, 0, BSIZE, BSIZE);
  bRGB = new Uint8Array(BSIZE * BSIZE * 3).fill(255);
}

function writePixel(x, y, r, g, b) {
  if (x < 0 || x >= BSIZE || y < 0 || y >= BSIZE) return;
  const i = (y * BSIZE + x) * 3;
  bRGB[i] = r; bRGB[i + 1] = g; bRGB[i + 2] = b;
  const id = new ImageData(new Uint8ClampedArray([r, g, b, 255]), 1, 1);
  bCtx.putImageData(id, x, y);
  mmDirty = true;
  sched();
}

function loadFull(rgb) {
  bRGB = rgb;
  const id   = bCtx.createImageData(BSIZE, BSIZE);
  const data = id.data;
  const n    = BSIZE * BSIZE;
  for (let i = 0; i < n; i++) {
    data[i * 4]     = rgb[i * 3];
    data[i * 4 + 1] = rgb[i * 3 + 1];
    data[i * 4 + 2] = rgb[i * 3 + 2];
    data[i * 4 + 3] = 255;
  }
  bCtx.putImageData(id, 0, 0);
  mmDirty = true;
}

// ─── App state ───────────────────────────────────────────
let ready    = false;
let showGrid = false;
let mmDirty  = true;
let color    = '#7c6ff7';
let onCD     = false;
let cdEnd    = 0;
let cdTick   = null;
let panning  = false;
let spDown   = false;
let lmx = 0, lmy = 0;
let lastBX = 0, lastBY = 0;

// ─── Color management ────────────────────────────────────
function setColor(hex) {
  color = hex;
  hlLabel.textContent = hex;
  cpInput.value       = hex;
  selbox.style.background = hex;
  gh.style.background     = hex;
  document.querySelectorAll('.sw').forEach(s =>
    s.classList.toggle('on', s.dataset.c === hex));
}

function buildPalette() {
  const cont = document.getElementById('palette');
  PALETTE.forEach(c => {
    const s = document.createElement('div');
    s.className = 'sw';
    s.style.background = c;
    s.dataset.c = c;
    s.title = c;
    s.addEventListener('click', () => setColor(c));
    cont.appendChild(s);
  });
}

cpInput.addEventListener('input', () => {
  setColor(cpInput.value);
  document.querySelectorAll('.sw').forEach(s => s.classList.remove('on'));
});

// ─── Cooldown (1 секунда) ────────────────────────────────
function startCooldown(ms) {
  if (cdTick) { clearInterval(cdTick); cdTick = null; }

  onCD  = true;
  cdEnd = Date.now() + ms;
  pbtn.disabled = true;
  cdWrap.classList.add('show');
  
  // Обновляем счетчик в верхней панели
  updateTopCooldown();

  function tick() {
    const rem = Math.max(0, cdEnd - Date.now());
    const frac = rem / CD_MS;
    cdArc.style.strokeDashoffset = (CD_CIRC * (1 - frac)).toFixed(3);
    cdNum.textContent = (rem / 1000).toFixed(1);
    
    // Обновляем счетчик вверху
    updateTopCooldown();

    if (rem <= 0) {
      clearInterval(cdTick);
      cdTick = null;
      onCD  = false;
      pbtn.disabled = false;
      cdWrap.classList.remove('show');
      cdArc.style.strokeDashoffset = CD_CIRC;
      cdNum.textContent = '0.0';
      hcd.textContent = '1.0s';
      toast('Ready!', 'ok', 800);
    }
  }
  
  function updateTopCooldown() {
    const rem = Math.max(0, cdEnd - Date.now());
    hcd.textContent = (rem/1000).toFixed(1) + 's';
    hcd.style.color = rem > 0 ? 'var(--accent)' : 'var(--txt)';
  }
  
  tick();
  cdTick = setInterval(tick, 50);
}

// ─── Place pixel ─────────────────────────────────────────
function hexToRgb(h) {
  const m = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(h);
  return m
    ? { r: parseInt(m[1], 16), g: parseInt(m[2], 16), b: parseInt(m[3], 16) }
    : { r: 255, g: 255, b: 255 };
}

function placeAt(bx, by) {
  if (!ready) { toast('Board loading…', 'inf', 1500); return; }
  if (onCD)   {
    toast(`Cooldown: ${((cdEnd - Date.now()) / 1000).toFixed(1)}s`, 'err', 800);
    return;
  }
  if (bx < 0 || bx >= BSIZE || by < 0 || by >= BSIZE) return;

  const { r, g, b } = hexToRgb(color);
  console.log(`[EMIT] pixel:place (${bx},${by}) rgb(${r},${g},${b})`);
  socket.emit('pixel:place', { x: Math.floor(bx), y: Math.floor(by), r, g, b });
}

// ─── Render ──────────────────────────────────────────────
let rafPending = false;
function sched() {
  if (!rafPending) {
    rafPending = true;
    requestAnimationFrame(doRender);
  }
}

function doRender() {
  rafPending = false;
  const W = cv.width, H = cv.height;

  ctx.fillStyle = '#1a1a26';
  ctx.fillRect(0, 0, W, H);

  if (!ready) return;

  ctx.save();
  ctx.setTransform(cam.z, 0, 0, cam.z, cam.x, cam.y);
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(bOC, 0, 0);

  if (showGrid && cam.z >= GRID_Z) {
    const x0 = Math.max(0, Math.floor(-cam.x / cam.z));
    const y0 = Math.max(0, Math.floor(-cam.y / cam.z));
    const x1 = Math.min(BSIZE, Math.ceil((W - cam.x) / cam.z));
    const y1 = Math.min(BSIZE, Math.ceil((H - cam.y) / cam.z));
    ctx.beginPath();
    ctx.strokeStyle = 'rgba(0,0,0,0.2)';
    ctx.lineWidth   = 1 / cam.z;
    for (let x = x0; x <= x1; x++) { ctx.moveTo(x, y0); ctx.lineTo(x, y1); }
    for (let y = y0; y <= y1; y++) { ctx.moveTo(x0, y); ctx.lineTo(x1, y); }
    ctx.stroke();
  }

  ctx.restore();

  if (mmDirty) { drawMM(); mmDirty = false; }
  drawMMvp(W, H);
}

// ─── Minimap ─────────────────────────────────────────────
function drawMM() {
  mmx.imageSmoothingEnabled = false;
  mmx.drawImage(bOC, 0, 0, MM_PX, MM_PX);
}
function drawMMvp(W, H) {
  const sc  = MM_PX / BSIZE;
  const vx0 = -cam.x / cam.z;
  const vy0 = -cam.y / cam.z;
  const vx1 = (W - cam.x) / cam.z;
  const vy1 = (H - cam.y) / cam.z;
  const rx  = Math.max(0, vx0) * sc;
  const ry  = Math.max(0, vy0) * sc;
  const rw  = (Math.min(BSIZE, vx1) - Math.max(0, vx0)) * sc;
  const rh  = (Math.min(BSIZE, vy1) - Math.max(0, vy0)) * sc;
  mmx.imageSmoothingEnabled = false;
  mmx.drawImage(bOC, 0, 0, MM_PX, MM_PX);
  mmx.strokeStyle = 'rgba(255,210,40,.9)';
  mmx.lineWidth   = 1.5;
  mmx.strokeRect(rx, ry, Math.max(2, rw), Math.max(2, rh));
}

document.getElementById('mmwrap').addEventListener('click', e => {
  const r  = mmc.getBoundingClientRect();
  const bx = (e.clientX - r.left) * (BSIZE / MM_PX);
  const by = (e.clientY - r.top)  * (BSIZE / MM_PX);
  cam.x = cv.width  / 2 - bx * cam.z;
  cam.y = cv.height / 2 - by * cam.z;
  clampCam();
  sched();
});

// ─── Input ───────────────────────────────────────────────
function resize() {
  cv.width  = window.innerWidth;
  cv.height = window.innerHeight;
  sched();
}
window.addEventListener('resize', resize);
resize();

cv.addEventListener('wheel', e => {
  e.preventDefault();
  zoomAt(e.clientX, e.clientY, e.deltaY < 0 ? 1 : -1);
  sched();
}, { passive: false });

cv.addEventListener('mousedown', e => {
  if (e.button === 2 || e.button === 1 || spDown) {
    e.preventDefault();
    panning = true;
    lmx = e.clientX; lmy = e.clientY;
    cv.style.cursor = 'grabbing';
    return;
  }
  if (e.button === 0) {
    e.preventDefault();
    const b = s2b(e.clientX, e.clientY);
    placeAt(b.x, b.y);
  }
});

window.addEventListener('mousemove', e => {
  if (panning) {
    cam.x += e.clientX - lmx;
    cam.y += e.clientY - lmy;
    lmx = e.clientX; lmy = e.clientY;
    clampCam();
    sched();
    return;
  }

  const b  = s2b(e.clientX, e.clientY);
  const bx = Math.floor(b.x);
  const by = Math.floor(b.y);
  lastBX = b.x; lastBY = b.y;

  const inside = bx >= 0 && bx < BSIZE && by >= 0 && by < BSIZE;
  hx.textContent = inside ? bx : '—';
  hy.textContent = inside ? by : '—';

  if (inside) {
    const tl  = b2s(bx, by);
    const sz  = Math.max(1, cam.z);
    gh.style.display = 'block';
    gh.style.left    = tl.x + 'px';
    gh.style.top     = tl.y + 'px';
    gh.style.width   = sz   + 'px';
    gh.style.height  = sz   + 'px';
  } else {
    gh.style.display = 'none';
  }
});

window.addEventListener('mouseup', () => {
  if (panning) {
    panning = false;
    cv.style.cursor = spDown ? 'grab' : 'crosshair';
  }
});

cv.addEventListener('contextmenu', e => e.preventDefault());

window.addEventListener('keydown', e => {
  switch (e.key) {
    case ' ':
      e.preventDefault();
      spDown = true;
      cv.style.cursor = 'grab';
      break;
    case 'r': case 'R':
      if (!e.ctrlKey && !e.metaKey) { resetView(); sched(); }
      break;
    case 'g': case 'G':
      showGrid = !showGrid;
      sched();
      toast('Grid ' + (showGrid ? 'on' : 'off'), 'inf', 700);
      break;
    case 'Enter':
      placeAt(lastBX, lastBY);
      break;
    case '+': case '=':
      zoomAt(cv.width / 2, cv.height / 2, 1); sched(); break;
    case '-': case '_':
      zoomAt(cv.width / 2, cv.height / 2, -1); sched(); break;
  }
});
window.addEventListener('keyup', e => {
  if (e.key === ' ') {
    spDown = false;
    cv.style.cursor = panning ? 'grabbing' : 'crosshair';
  }
});

hbtn.addEventListener('click', e => {
  e.stopPropagation();
  hpanel.classList.toggle('on');
});
document.addEventListener('click', e => {
  if (!hpanel.contains(e.target) && e.target !== hbtn)
    hpanel.classList.remove('on');
});

pbtn.addEventListener('click', () => placeAt(lastBX, lastBY));

// ─── Toasts ──────────────────────────────────────────────
function toast(msg, type = 'inf', ms = 1800) {
  const t = document.createElement('div');
  t.className = 'tt ' + type;
  t.textContent = msg;
  document.getElementById('tc').appendChild(t);
  setTimeout(() => {
    t.style.transition = 'opacity .25s';
    t.style.opacity = '0';
    setTimeout(() => t.remove(), 260);
  }, ms);
}

// ─── Loading bar ─────────────────────────────────────────
function prog(p, msg) {
  lb.style.width = p + '%';
  if (msg) ls.textContent = msg;
}

// ─── Socket.io ───────────────────────────────────────────
const socket = io({
  transports: ['websocket', 'polling'],
  reconnection:        true,
  reconnectionAttempts: 10,
  reconnectionDelay:   1000,
  timeout:             20000,
});

socket.on('connect', () => {
  console.log('[Socket] Connected ✅ id=', socket.id);
  connBadge.className   = 'ok';
  connBadge.textContent = '● Connected';
  prog(20, 'Connected — loading board…');
  toast('Connected!', 'ok', 1200);
});

socket.on('disconnect', reason => {
  console.log('[Socket] Disconnected:', reason);
  connBadge.className   = 'bad';
  connBadge.textContent = '● Disconnected';
  toast('Disconnected: ' + reason, 'err');
});

socket.on('connect_error', err => {
  console.error('[Socket] connect_error:', err.message);
  connBadge.className   = 'mid';
  connBadge.textContent = '● Reconnecting…';
});

socket.on('reconnect', attempt => {
  console.log('[Socket] Reconnected after', attempt, 'attempts');
  toast('Reconnected!', 'ok', 1200);
});

socket.on('board:meta', data => {
  console.log('[Meta]', data);
  prog(30, 'Received metadata…');
});

socket.on('board:load_via_rest', async ({ url }) => {
  try {
    prog(35, 'Downloading board…');
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);

    const buf = await res.arrayBuffer();
    prog(65, 'Decompressing…');
    const rgb = pako.inflate(new Uint8Array(buf));

    prog(82, 'Rendering…');
    initBoard();
    loadFull(rgb);

    ready = true;
    resetView();
    sched();

    prog(100, 'Ready!');
    setTimeout(() => {
      ldDiv.classList.add('out');
      setTimeout(() => ldDiv.style.display = 'none', 450);
    }, 300);

    toast('Board loaded! 1s cooldown', 'ok', 2000);
  } catch (err) {
    console.error('[Board] Load failed:', err);
    ls.textContent = 'Error: ' + err.message;
    toast('Load failed: ' + err.message, 'err', 4000);
  }
});

socket.on('pixel:update', ({ x, y, r, g, b }) => {
  console.log(`[RECV] pixel:update (${x},${y}) rgb(${r},${g},${b})`);
  if (!ready) return;
  writePixel(x, y, r, g, b);
});

socket.on('pixel:accepted', ({ x, y, r, g, b, cooldownMs }) => {
  console.log(`[ACK] pixel:accepted (${x},${y})`);
  writePixel(x, y, r, g, b);
  startCooldown(cooldownMs);
});

socket.on('pixel:rejected', ({ reason, remaining }) => {
  console.log('[REJ] pixel:rejected reason=', reason);
  if (reason === 'cooldown') {
    toast(`Wait ${(remaining / 1000).toFixed(1)}s`, 'err', 1200);
    if (!onCD) startCooldown(remaining);
  } else {
    toast('Rejected: ' + reason, 'err', 2000);
  }
});

socket.on('stats:online', n => {
  hon.textContent = n;
});

// ─── Init ────────────────────────────────────────────────
buildPalette();
setColor(color);

ctx.fillStyle = '#1a1a26';
ctx.fillRect(0, 0, cv.width, cv.height);

console.log('🎨 Pixel Battle 2048x2048 • 1s cooldown');
</script>
