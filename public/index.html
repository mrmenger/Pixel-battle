<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>⬛ Pixel Battle</title>
  <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:      #0d0d14;
      --panel:   rgba(13,13,22,0.97);
      --border:  rgba(255,255,255,0.10);
      --accent:  #7c6ff7;
      --accent2: #9d98f9;
      --ok:      #6ff7a0;
      --err:     #f76f6f;
      --warn:    #f7c86f;
      --txt:     #e8e8f0;
      --dim:     #6a6a7c;
    }
    html,body{
      width:100%;height:100%;overflow:hidden;
      background:var(--bg);
      font-family:'Segoe UI',system-ui,sans-serif;
      color:var(--txt);user-select:none;
      touch-action:none;
      -webkit-tap-highlight-color:transparent;
      -webkit-touch-callout:none;
    }

    /* ── Canvas ─────────────────────────────────────── */
    #cv{
      position:fixed;inset:0;display:block;
      image-rendering:pixelated;
      image-rendering:crisp-edges;
      cursor:crosshair;
      touch-action:none;
    }

    /* ── Top bar ────────────────────────────────────── */
    #bar{
      position:fixed;top:0;left:0;right:0;height:48px;
      background:var(--panel);border-bottom:1px solid var(--border);
      backdrop-filter:blur(14px);
      display:flex;align-items:center;gap:8px;padding:0 12px;
      z-index:200;pointer-events:none;
    }
    #bar>*{pointer-events:auto}
    #logo{font-size:.88rem;font-weight:800;letter-spacing:.07em;color:var(--accent2);flex-shrink:0}
    #logo span{color:#fff}
    .pill{
      display:flex;align-items:center;gap:3px;
      background:rgba(255,255,255,.04);border:1px solid var(--border);
      border-radius:5px;padding:3px 7px;
      font-size:.70rem;font-family:'Courier New',monospace;
      color:var(--dim);flex-shrink:0;
    }
    .pill b{color:var(--txt);font-weight:600}
    @media(max-width:480px){.pill.coords{display:none}}
    #sp{flex:1}
    #ol{display:flex;align-items:center;gap:5px;font-size:.74rem;color:var(--dim);flex-shrink:0}
    .dot{width:7px;height:7px;border-radius:50%;background:var(--ok);animation:dp 2s ease-in-out infinite}
    @keyframes dp{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}

    /* ── Cooldown ring ───────────────────────────────── */
    #cdwrap{
      position:fixed;
      top:58px;          /* сразу под топбаром */
      left:50%;transform:translateX(-50%);
      display:flex;flex-direction:column;align-items:center;gap:5px;
      z-index:201;opacity:0;pointer-events:none;
      transition:opacity .2s;
    }
    #cdwrap.show{opacity:1}
    #cdr{position:relative;width:72px;height:72px}
    #cdr svg{width:72px;height:72px;transform:rotate(-90deg)}
    #cdr .tr{fill:none;stroke:rgba(255,255,255,.07);stroke-width:5}
    #cdr .ar{
      fill:none;stroke:var(--accent);stroke-width:6;stroke-linecap:round;
      /* r=29.3 → C≈184.1 */
      stroke-dasharray:184.1;stroke-dashoffset:184.1;
    }
    #cdn{
      position:absolute;inset:0;
      display:flex;align-items:center;justify-content:center;
      font-size:1.15rem;font-weight:800;color:var(--accent2);
      text-shadow:0 0 12px rgba(124,111,247,.6);
    }
    #cdl{font-size:.70rem;color:var(--accent2);letter-spacing:.08em;text-transform:uppercase;font-weight:600}

    /* ── Bottom panel ───────────────────────────────── */
    #panel{
      position:fixed;bottom:0;left:0;right:0;
      background:var(--panel);border-top:1px solid var(--border);
      backdrop-filter:blur(18px);
      padding:10px 12px;
      padding-bottom:max(10px,env(safe-area-inset-bottom));
      display:flex;flex-direction:column;gap:10px;
      z-index:200;box-shadow:0 -8px 32px rgba(0,0,0,.5);
    }
    #panel-top{display:flex;align-items:center;gap:10px}

    /* Palette — свотчи ×1.35: 24→32px */
    #palette{display:flex;gap:6px;flex-wrap:wrap;flex:1}
    .sw{
      width:32px;height:32px;border-radius:6px;cursor:pointer;
      border:2px solid transparent;flex-shrink:0;
      transition:transform .12s,border-color .12s,box-shadow .12s;
      -webkit-tap-highlight-color:transparent;
    }
    .sw:hover{transform:scale(1.15)}
    .sw.on{border-color:#fff;box-shadow:0 0 0 2px var(--accent);transform:scale(1.2)}
    @media(max-width:600px){.sw{width:34px;height:34px}}

    .vd{width:1px;height:36px;background:var(--border);flex-shrink:0}

    /* Custom color — ×1.35: 32→43px */
    #cpw{display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0}
    #cp{
      width:43px;height:43px;border:2px solid var(--border);
      border-radius:8px;cursor:pointer;background:none;padding:2px;
    }
    #cp::-webkit-color-swatch-wrapper{padding:0}
    #cp::-webkit-color-swatch{border:none;border-radius:5px}
    #hl{font-size:.60rem;font-family:monospace;color:var(--dim)}

    /* Selected preview — ×1.35: 28→38px */
    #selbox{width:38px;height:38px;border-radius:8px;border:2px solid rgba(255,255,255,.25);flex-shrink:0}

    /* Place button */
    #pbtn{
      padding:11px 20px;background:var(--accent);color:#fff;
      border:none;border-radius:10px;font-size:.9rem;font-weight:700;
      cursor:pointer;letter-spacing:.03em;white-space:nowrap;flex-shrink:0;
      transition:background .15s,transform .1s;min-height:46px;
      -webkit-tap-highlight-color:transparent;
    }
    #pbtn:hover:not(:disabled){background:var(--accent2);transform:scale(1.04)}
    #pbtn:active:not(:disabled){transform:scale(.94)}
    #pbtn:disabled{background:#2a2a38;color:var(--dim);cursor:not-allowed}

    /* ── Zoom buttons ───────────────────────────────── */
    #zoom-btns{
      position:fixed;right:12px;top:50%;transform:translateY(-50%);
      display:flex;flex-direction:column;gap:8px;z-index:200;
    }
    .zbtn{
      width:44px;height:44px;background:var(--panel);
      border:1px solid var(--border);border-radius:10px;
      color:var(--txt);font-size:1.4rem;font-weight:300;
      cursor:pointer;display:flex;align-items:center;justify-content:center;
      box-shadow:0 4px 16px rgba(0,0,0,.4);
      -webkit-tap-highlight-color:transparent;
      transition:background .1s,transform .1s;user-select:none;
    }
    .zbtn:active{background:rgba(124,111,247,.2);transform:scale(.9)}

    /* ── Minimap ────────────────────────────────────── */
    #mmwrap{
      position:fixed;bottom:140px;right:62px;
      z-index:200;border:1px solid var(--border);border-radius:7px;
      overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.6);
      cursor:crosshair;background:#111;
    }
    #mmc{display:block;width:100px;height:100px;image-rendering:pixelated}
    @media(max-width:480px){
      #mmwrap{width:70px;height:70px;bottom:160px;right:60px}
      #mmc{width:70px;height:70px}
    }

    /* ── Connection badge ───────────────────────────── */
    #conn{
      position:fixed;top:56px;left:14px;font-size:.68rem;
      padding:3px 9px;border-radius:20px;z-index:200;
      border:1px solid transparent;transition:all .3s;pointer-events:none;
    }
    #conn.ok {background:rgba(111,247,160,.1);border-color:var(--ok);color:var(--ok)}
    #conn.bad{background:rgba(247,111,111,.1);border-color:var(--err);color:var(--err)}
    #conn.mid{background:rgba(247,200,111,.1);border-color:var(--warn);color:var(--warn)}

    /* ── Toasts ─────────────────────────────────────── */
    #tc{position:fixed;top:56px;right:14px;display:flex;flex-direction:column;gap:6px;z-index:300;pointer-events:none}
    .tt{
      padding:7px 13px;border-radius:6px;font-size:.76rem;
      background:var(--panel);border:1px solid var(--border);
      backdrop-filter:blur(10px);max-width:220px;
      animation:tin .2s ease forwards;
    }
    .tt.ok {border-color:var(--ok);color:var(--ok)}
    .tt.err{border-color:var(--err);color:var(--err)}
    .tt.inf{border-color:var(--accent);color:var(--accent2)}
    @keyframes tin{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:none}}

    /* ── Loading ────────────────────────────────────── */
    #ld{
      position:fixed;inset:0;background:var(--bg);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:16px;z-index:999;transition:opacity .4s;
    }
    #ld.out{opacity:0;pointer-events:none}
    #ld h2{font-size:1.5rem;color:var(--accent2);letter-spacing:.1em;text-align:center}
    #lbw{width:240px;height:4px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden}
    #lb{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width .3s ease}
    #ls{font-size:.74rem;color:var(--dim)}

    /* ── Ghost cursor ───────────────────────────────── */
    #gh{
      position:fixed;pointer-events:none;z-index:99;
      border:2px solid rgba(255,255,255,.9);
      box-shadow:0 0 0 1px rgba(0,0,0,.6);
      display:none;
    }

    /* ── Touch ripple ───────────────────────────────── */
    .ripple{
      position:fixed;width:36px;height:36px;border-radius:50%;
      border:2px solid var(--accent2);pointer-events:none;z-index:298;
      transform:translate(-50%,-50%) scale(0);
      animation:rpl .45s ease forwards;
    }
    @keyframes rpl{
      0%{transform:translate(-50%,-50%) scale(0);opacity:1}
      100%{transform:translate(-50%,-50%) scale(2.2);opacity:0}
    }

    /* ── Help ───────────────────────────────────────── */
    #hbtn{
      position:fixed;top:56px;right:14px;width:30px;height:30px;
      border-radius:50%;background:var(--panel);border:1px solid var(--border);
      color:var(--dim);font-size:.8rem;cursor:pointer;
      display:flex;align-items:center;justify-content:center;z-index:200;
      -webkit-tap-highlight-color:transparent;
    }
    #hp{
      position:fixed;top:94px;right:14px;background:var(--panel);
      border:1px solid var(--border);border-radius:9px;
      backdrop-filter:blur(14px);padding:12px 15px;
      font-size:.73rem;color:var(--dim);line-height:2;z-index:200;
      display:none;box-shadow:0 8px 32px rgba(0,0,0,.6);min-width:190px;
    }
    #hp.on{display:block}
    #hp strong{color:var(--txt);display:inline-block;min-width:110px}
  </style>
</head>
<body>

<!-- Loading -->
<div id="ld">
  <h2>⬛ PIXEL BATTLE</h2>
  <div id="lbw"><div id="lb"></div></div>
  <div id="ls">Connecting…</div>
</div>

<!-- Top bar -->
<div id="bar">
  <div id="logo">⬛ PIXEL <span>BATTLE</span></div>
  <div class="pill coords">X <b id="hx">—</b></div>
  <div class="pill coords">Y <b id="hy">—</b></div>
  <div class="pill">Z <b id="hz">100%</b></div>
  <div class="pill">CD <b id="hcd">1.0s</b></div>
  <div id="sp"></div>
  <div id="ol"><div class="dot"></div><span id="hon">—</span></div>
</div>

<!-- Canvas -->
<canvas id="cv"></canvas>

<!-- Ghost -->
<div id="gh"></div>

<!-- Cooldown ring -->
<div id="cdwrap">
  <div id="cdr">
    <svg viewBox="0 0 72 72">
      <circle class="tr" cx="36" cy="36" r="29.3"/>
      <circle class="ar" cx="36" cy="36" r="29.3" id="cdarc"/>
    </svg>
    <div id="cdn">1.0</div>
  </div>
  <div id="cdl">COOLDOWN</div>
</div>

<!-- Zoom buttons -->
<div id="zoom-btns">
  <button class="zbtn" id="zin">+</button>
  <button class="zbtn" id="zout">−</button>
  <button class="zbtn" id="zrst" style="font-size:.75rem">⌂</button>
</div>

<!-- Minimap -->
<div id="mmwrap"><canvas id="mmc" width="100" height="100"></canvas></div>

<!-- Connection -->
<div id="conn" class="bad">● Offline</div>

<!-- Toasts -->
<div id="tc"></div>

<!-- Help -->
<button id="hbtn">?</button>
<div id="hp">
  <strong>Tap</strong>Place pixel<br>
  <strong>1-finger drag</strong>Pan<br>
  <strong>2-finger pinch</strong>Zoom<br>
  <strong>Scroll</strong>Zoom<br>
  <strong>Right drag</strong>Pan<br>
  <strong>R</strong>Reset view<br>
  <strong>G</strong>Grid toggle<br>
</div>

<!-- Bottom panel -->
<div id="panel">
  <div id="panel-top">
    <div id="palette"></div>
    <div class="vd"></div>
    <div id="cpw">
      <input type="color" id="cp" value="#7c6ff7"/>
      <div id="hl">#7c6ff7</div>
    </div>
    <div class="vd"></div>
    <div id="selbox"></div>
    <button id="pbtn">▪ Place</button>
  </div>
</div>

<script>
'use strict';

/* ═══════════════════════════════════════════════════════
   ВАЖНО — два разных таймаута:

   TAP_MAX_MS  = 200  — максимальное время касания пальцем
                        чтобы считаться ТАПОМ (не свайпом).
                        Это про физику пальца, НЕ про кулдаун.

   CD_MS       = 1000 — кулдаун сервера между постановками.
                        Это про игровую механику.

   Они НИКАК не связаны между собой.
═══════════════════════════════════════════════════════ */

// ─── Константы ──────────────────────────────────────────
const BSIZE      = 2048;
const CD_MS      = 1000;   // кулдаун игры: 1 секунда
const TAP_MAX_MS = 200;    // макс длительность касания = тап
const TAP_MAX_PX = 10;     // макс сдвиг пальца = тап (px)
const MIN_ZOOM   = 0.05;
const MAX_ZOOM   = 48;
const ZF         = 0.15;
const GRID_Z     = 6;
const MM_PX      = 100;
const CD_CIRC    = 2 * Math.PI * 29.3; // ≈ 184.1

// ─── Палитра ────────────────────────────────────────────
const PALETTE = [
  '#ffffff','#c0c0c0','#808080','#404040','#202020','#000000',
  '#ffa7d1','#e50000','#ff6900','#ffa500','#ffe600','#a06a42',
  '#7eed56','#00cc00','#00d3dd','#2450a4','#3f00ff','#811e9f',
  '#cf6ee4','#ff99aa','#00cc78','#7c6ff7','#46d160','#25c2e3',
];

// ─── DOM ────────────────────────────────────────────────
const cv        = document.getElementById('cv');
const ctx       = cv.getContext('2d', { alpha:false });
const mmc       = document.getElementById('mmc');
const mmx       = mmc.getContext('2d');
const ldDiv     = document.getElementById('ld');
const lb        = document.getElementById('lb');
const ls        = document.getElementById('ls');
const hx        = document.getElementById('hx');
const hy        = document.getElementById('hy');
const hz        = document.getElementById('hz');
const hcd       = document.getElementById('hcd');
const hon       = document.getElementById('hon');
const pbtn      = document.getElementById('pbtn');
const cpInput   = document.getElementById('cp');
const hlLabel   = document.getElementById('hl');
const selbox    = document.getElementById('selbox');
const cdWrap    = document.getElementById('cdwrap');
const cdArc     = document.getElementById('cdarc');
const cdNum     = document.getElementById('cdn');
const connBadge = document.getElementById('conn');
const gh        = document.getElementById('gh');
const hbtn      = document.getElementById('hbtn');
const hpanel    = document.getElementById('hp');

// ─── Camera ─────────────────────────────────────────────
const cam = { x:0, y:0, z:1 };

function s2b(sx, sy){ return { x:(sx-cam.x)/cam.z, y:(sy-cam.y)/cam.z }; }
function b2s(bx, by){ return { x:bx*cam.z+cam.x,  y:by*cam.z+cam.y  }; }

function clampCam(){
  const W=cv.width, H=cv.height, M=60;
  const bw=BSIZE*cam.z, bh=BSIZE*cam.z;
  cam.x=Math.min(cam.x, W-M); cam.x=Math.max(cam.x,-bw+M);
  cam.y=Math.min(cam.y, H-M); cam.y=Math.max(cam.y,-bh+M);
}

function zoomAt(sx, sy, dir){
  const f  = dir>0 ? (1+ZF) : 1/(1+ZF);
  const nz = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, cam.z*f));
  if(nz===cam.z) return;
  const bx=(sx-cam.x)/cam.z, by=(sy-cam.y)/cam.z;
  cam.x=sx-bx*nz; cam.y=sy-by*nz; cam.z=nz;
  clampCam();
  hz.textContent=(cam.z*100).toFixed(0)+'%';
}

function zoomCenter(dir){ zoomAt(cv.width/2, cv.height/2, dir); sched(); }

function resetView(){
  const W=cv.width, H=cv.height, mg=24;
  const panelH=document.getElementById('panel').offsetHeight+mg;
  const availH=H-48-panelH;
  cam.z=Math.min((W-mg*2)/BSIZE, availH/BSIZE);
  cam.x=(W-BSIZE*cam.z)/2;
  cam.y=48+(availH-BSIZE*cam.z)/2;
  hz.textContent=(cam.z*100).toFixed(0)+'%';
}

// ─── Board buffer ────────────────────────────────────────
let bOC, bCtx, bRGB;

function initBoard(){
  bOC = typeof OffscreenCanvas!=='undefined'
    ? new OffscreenCanvas(BSIZE,BSIZE)
    : Object.assign(document.createElement('canvas'),{width:BSIZE,height:BSIZE});
  bCtx=bOC.getContext('2d',{alpha:false});
  bCtx.fillStyle='#ffffff';
  bCtx.fillRect(0,0,BSIZE,BSIZE);
  bRGB=new Uint8Array(BSIZE*BSIZE*3).fill(255);
}

function writePixel(x,y,r,g,b){
  if(x<0||x>=BSIZE||y<0||y>=BSIZE) return;
  const i=(y*BSIZE+x)*3;
  bRGB[i]=r; bRGB[i+1]=g; bRGB[i+2]=b;
  bCtx.putImageData(new ImageData(new Uint8ClampedArray([r,g,b,255]),1,1),x,y);
  mmDirty=true; sched();
}

function loadFull(rgb){
  bRGB=rgb;
  const id=bCtx.createImageData(BSIZE,BSIZE), d=id.data, n=BSIZE*BSIZE;
  for(let i=0;i<n;i++){
    d[i*4]=rgb[i*3]; d[i*4+1]=rgb[i*3+1]; d[i*4+2]=rgb[i*3+2]; d[i*4+3]=255;
  }
  bCtx.putImageData(id,0,0);
  mmDirty=true;
}

// ─── State ───────────────────────────────────────────────
let ready=false, showGrid=false, mmDirty=true;
let color='#7c6ff7';
let onCD=false, cdEnd=0, cdTick=null;

// Desktop pan
let panning=false, spDown=false, lmx=0, lmy=0;
let lastBX=0, lastBY=0;

// ─── Color ───────────────────────────────────────────────
function setColor(hex){
  color=hex; hlLabel.textContent=hex;
  cpInput.value=hex;
  selbox.style.background=hex;
  gh.style.background=hex;
  document.querySelectorAll('.sw').forEach(s=>s.classList.toggle('on',s.dataset.c===hex));
}

function buildPalette(){
  const c=document.getElementById('palette');
  PALETTE.forEach(col=>{
    const s=document.createElement('div');
    s.className='sw'; s.style.background=col; s.dataset.c=col; s.title=col;
    // Клик (десктоп)
    s.addEventListener('click', ()=>setColor(col));
    // Касание (телефон) — preventDefault чтобы не стрелял click тоже
    s.addEventListener('touchend', e=>{ e.preventDefault(); setColor(col); },{passive:false});
    c.appendChild(s);
  });
}

cpInput.addEventListener('input',()=>{
  setColor(cpInput.value);
  document.querySelectorAll('.sw').forEach(s=>s.classList.remove('on'));
});

// ─── Cooldown (1 секунда игрового кулдауна) ──────────────
/*
  Этот кулдаун — ИГРОВОЙ. 1000ms = 1 секунда между постановками пикселей.
  Не путать с TAP_MAX_MS (200ms) — это про определение жеста пальца.
*/
function startCooldown(ms){
  if(cdTick){ clearInterval(cdTick); cdTick=null; }
  onCD=true; cdEnd=Date.now()+ms;
  pbtn.disabled=true;
  cdWrap.classList.add('show');

  function tick(){
    const rem=Math.max(0, cdEnd-Date.now());
    const frac=rem/CD_MS;
    cdArc.style.strokeDashoffset=(CD_CIRC*(1-frac)).toFixed(3);
    cdNum.textContent=(rem/1000).toFixed(1);
    hcd.textContent=(rem/1000).toFixed(1)+'s';
    hcd.style.color=rem>0 ? 'var(--accent2)' : 'var(--txt)';

    if(rem<=0){
      clearInterval(cdTick); cdTick=null;
      onCD=false; pbtn.disabled=false;
      cdWrap.classList.remove('show');
      cdArc.style.strokeDashoffset=CD_CIRC;
      cdNum.textContent='0.0';
      hcd.textContent='1.0s';
      hcd.style.color='var(--txt)';
      toast('Ready! 🎨','ok',600);
    }
  }
  tick();
  cdTick=setInterval(tick,50);
}

// ─── Place pixel ─────────────────────────────────────────
function hexToRgb(h){
  const m=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(h);
  return m?{r:parseInt(m[1],16),g:parseInt(m[2],16),b:parseInt(m[3],16)}:{r:255,g:255,b:255};
}

function placeAt(bx,by){
  if(!ready){ toast('Loading…','inf',700); return; }

  // Проверка игрового кулдауна (1 секунда)
  if(onCD){
    const rem=cdEnd-Date.now();
    toast(`Wait ${(rem/1000).toFixed(1)}s`,'err',600);
    return;
  }

  bx=Math.floor(bx); by=Math.floor(by);
  if(bx<0||bx>=BSIZE||by<0||by>=BSIZE) return;

  const {r,g,b}=hexToRgb(color);
  socket.emit('pixel:place',{x:bx,y:by,r,g,b});
}

// ─── Render ──────────────────────────────────────────────
let rafPending=false;
function sched(){
  if(!rafPending){ rafPending=true; requestAnimationFrame(doRender); }
}

function doRender(){
  rafPending=false;
  const W=cv.width, H=cv.height;
  ctx.fillStyle='#1a1a26';
  ctx.fillRect(0,0,W,H);
  if(!ready) return;

  ctx.save();
  ctx.setTransform(cam.z,0,0,cam.z,cam.x,cam.y);
  ctx.imageSmoothingEnabled=false;
  ctx.drawImage(bOC,0,0);

  if(showGrid && cam.z>=GRID_Z){
    const x0=Math.max(0,Math.floor(-cam.x/cam.z));
    const y0=Math.max(0,Math.floor(-cam.y/cam.z));
    const x1=Math.min(BSIZE,Math.ceil((W-cam.x)/cam.z));
    const y1=Math.min(BSIZE,Math.ceil((H-cam.y)/cam.z));
    ctx.beginPath();
    ctx.strokeStyle='rgba(0,0,0,0.2)';
    ctx.lineWidth=1/cam.z;
    for(let x=x0;x<=x1;x++){ctx.moveTo(x,y0);ctx.lineTo(x,y1)}
    for(let y=y0;y<=y1;y++){ctx.moveTo(x0,y);ctx.lineTo(x1,y)}
    ctx.stroke();
  }
  ctx.restore();

  if(mmDirty){ drawMM(); mmDirty=false; }
  drawMMvp(W,H);
}

// ─── Minimap ─────────────────────────────────────────────
function drawMM(){
  mmx.imageSmoothingEnabled=false;
  mmx.drawImage(bOC,0,0,MM_PX,MM_PX);
}
function drawMMvp(W,H){
  const sc=MM_PX/BSIZE;
  const vx0=-cam.x/cam.z, vy0=-cam.y/cam.z;
  const vx1=(W-cam.x)/cam.z, vy1=(H-cam.y)/cam.z;
  const rx=Math.max(0,vx0)*sc, ry=Math.max(0,vy0)*sc;
  const rw=(Math.min(BSIZE,vx1)-Math.max(0,vx0))*sc;
  const rh=(Math.min(BSIZE,vy1)-Math.max(0,vy0))*sc;
  mmx.imageSmoothingEnabled=false;
  mmx.drawImage(bOC,0,0,MM_PX,MM_PX);
  mmx.strokeStyle='rgba(255,210,40,.9)';
  mmx.lineWidth=1.5;
  mmx.strokeRect(rx,ry,Math.max(2,rw),Math.max(2,rh));
}
document.getElementById('mmwrap').addEventListener('click',e=>{
  const r=mmc.getBoundingClientRect();
  const bx=(e.clientX-r.left)*(BSIZE/MM_PX);
  const by=(e.clientY-r.top)*(BSIZE/MM_PX);
  cam.x=cv.width/2-bx*cam.z;
  cam.y=cv.height/2-by*cam.z;
  clampCam(); sched();
});

// ─── Canvas resize ───────────────────────────────────────
function resize(){
  cv.width=window.innerWidth;
  cv.height=window.innerHeight;
  sched();
}
window.addEventListener('resize', resize);
resize();

// ─── Ghost cursor ────────────────────────────────────────
function showGhost(bx,by){
  const tl=b2s(bx,by), sz=Math.max(1,cam.z);
  gh.style.display='block';
  gh.style.left=tl.x+'px'; gh.style.top=tl.y+'px';
  gh.style.width=sz+'px';  gh.style.height=sz+'px';
}
function hideGhost(){ gh.style.display='none'; }

// ─── Touch ripple ────────────────────────────────────────
function ripple(x,y){
  const el=document.createElement('div');
  el.className='ripple';
  el.style.left=x+'px'; el.style.top=y+'px';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 480);
}

// ════════════════════════════════════════════════════════
//  TOUCH — мобильное управление
//
//  Состояние каждого касания хранится в Map touchState.
//  Ключ — Touch.identifier (уникален для каждого пальца).
//
//  Тап = касание < TAP_MAX_MS мс И сдвиг < TAP_MAX_PX px.
//  Всё остальное = жест (пан или пинч).
// ════════════════════════════════════════════════════════

// Хранилище активных касаний { id → {x,y,startX,startY,startT} }
const tp = new Map();

// Предыдущая позиция одного пальца (для плавного пана)
let prev1X = -1, prev1Y = -1;
// Предыдущие данные пинча
let prevPinchDist = 0, prevPinchMX = 0, prevPinchMY = 0;

function pinchDist(){
  const [a,b] = [...tp.values()];
  return Math.hypot(a.x-b.x, a.y-b.y);
}
function pinchMid(){
  const [a,b] = [...tp.values()];
  return { x:(a.x+b.x)/2, y:(a.y+b.y)/2 };
}

cv.addEventListener('touchstart', e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    tp.set(t.identifier,{
      x:t.clientX, y:t.clientY,
      startX:t.clientX, startY:t.clientY,
      startT:Date.now(),
    });
  }

  if(tp.size===1){
    // Один палец — готовимся к пану или тапу
    const [v] = tp.values();
    prev1X=v.x; prev1Y=v.y;
    prevPinchDist=0;
  }
  if(tp.size===2){
    // Два пальца — начало пинча
    prevPinchDist=pinchDist();
    const m=pinchMid();
    prevPinchMX=m.x; prevPinchMY=m.y;
    prev1X=-1; prev1Y=-1; // сбрасываем пан одним пальцем
  }
},{passive:false});

cv.addEventListener('touchmove', e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    const s=tp.get(t.identifier);
    if(s){ s.x=t.clientX; s.y=t.clientY; }
  }

  if(tp.size===1){
    // ── Пан одним пальцем ─────────────────────────
    const [v]=tp.values();
    if(prev1X>=0){
      cam.x+=v.x-prev1X;
      cam.y+=v.y-prev1Y;
      clampCam(); sched();
    }
    prev1X=v.x; prev1Y=v.y;

    // Обновляем координаты в HUD
    const b=s2b(v.x,v.y), bx=Math.floor(b.x), by=Math.floor(b.y);
    const inside=bx>=0&&bx<BSIZE&&by>=0&&by<BSIZE;
    hx.textContent=inside?bx:'—'; hy.textContent=inside?by:'—';

  } else if(tp.size===2){
    // ── Пинч: зум + пан двумя пальцами ──────────
    const newDist=pinchDist();
    const m=pinchMid();

    if(prevPinchDist>0){
      // Зум
      const ratio=newDist/prevPinchDist;
      const nz=Math.min(MAX_ZOOM,Math.max(MIN_ZOOM,cam.z*ratio));
      const bx=(m.x-cam.x)/cam.z, by=(m.y-cam.y)/cam.z;
      cam.x=m.x-bx*nz; cam.y=m.y-by*nz; cam.z=nz;
      hz.textContent=(cam.z*100).toFixed(0)+'%';
    }
    // Пан середины пинча
    cam.x+=m.x-prevPinchMX;
    cam.y+=m.y-prevPinchMY;

    prevPinchDist=newDist;
    prevPinchMX=m.x; prevPinchMY=m.y;
    clampCam(); sched();
  }
},{passive:false});

cv.addEventListener('touchend', e=>{
  e.preventDefault();

  for(const t of e.changedTouches){
    const s=tp.get(t.identifier);
    if(!s){ tp.delete(t.identifier); continue; }

    // ── Проверяем: был ли это тап? ────────────────
    const elapsed = Date.now() - s.startT;          // время касания (мс)
    const dx      = t.clientX - s.startX;           // сдвиг по X (px)
    const dy      = t.clientY - s.startY;           // сдвиг по Y (px)
    const moved   = Math.hypot(dx,dy) > TAP_MAX_PX; // сдвинулся больше порога?

    /*
      ТАП если:
      1. Палец держали МЕНЬШЕ TAP_MAX_MS миллисекунд (200ms)
      2. Палец сдвинулся МЕНЬШЕ TAP_MAX_PX пикселей (10px)
      3. Был только ОДИН палец (не пинч)

      Это определение ЖЕСТА ПАЛЬЦА — не имеет отношения
      к игровому кулдауну (1 секунда).
      Если кулдаун не прошёл — placeAt() сам покажет toast.
    */
    if(elapsed < TAP_MAX_MS && !moved && tp.size <= 1){
      const tx=t.clientX, ty=t.clientY;
      const b=s2b(tx,ty);
      ripple(tx,ty);
      showGhost(Math.floor(b.x),Math.floor(b.y));
      setTimeout(hideGhost,350);

      // Пробуем поставить пиксель.
      // Если игровой кулдаун ещё идёт — placeAt покажет "Wait Xs"
      placeAt(b.x, b.y);
    }

    tp.delete(t.identifier);
  }

  // Сброс состояния пинча если осталось < 2 пальцев
  if(tp.size<2){ prevPinchDist=0; }
  if(tp.size===0){ prev1X=-1; prev1Y=-1; }
  if(tp.size===1){
    const [v]=tp.values();
    prev1X=v.x; prev1Y=v.y;
  }

},{passive:false});

cv.addEventListener('touchcancel', e=>{
  for(const t of e.changedTouches) tp.delete(t.identifier);
  prevPinchDist=0; prev1X=-1; prev1Y=-1;
});

// ════════════════════════════════════════════════════════
//  MOUSE — десктопное управление
// ════════════════════════════════════════════════════════
cv.addEventListener('wheel', e=>{
  e.preventDefault();
  zoomAt(e.clientX, e.clientY, e.deltaY<0?1:-1);
  sched();
},{passive:false});

cv.addEventListener('mousedown', e=>{
  if(e.button===2||e.button===1||spDown){
    e.preventDefault();
    panning=true; lmx=e.clientX; lmy=e.clientY;
    cv.style.cursor='grabbing'; return;
  }
  if(e.button===0){
    e.preventDefault();
    const b=s2b(e.clientX,e.clientY);
    placeAt(b.x,b.y);
  }
});

window.addEventListener('mousemove', e=>{
  if(panning){
    cam.x+=e.clientX-lmx; cam.y+=e.clientY-lmy;
    lmx=e.clientX; lmy=e.clientY;
    clampCam(); sched(); return;
  }
  const b=s2b(e.clientX,e.clientY);
  lastBX=b.x; lastBY=b.y;
  const bx=Math.floor(b.x), by=Math.floor(b.y);
  const inside=bx>=0&&bx<BSIZE&&by>=0&&by<BSIZE;
  hx.textContent=inside?bx:'—'; hy.textContent=inside?by:'—';
  if(inside) showGhost(bx,by); else hideGhost();
});

window.addEventListener('mouseup', ()=>{
  if(panning){ panning=false; cv.style.cursor=spDown?'grab':'crosshair'; }
});

cv.addEventListener('contextmenu', e=>e.preventDefault());

// ─── Keyboard ────────────────────────────────────────────
window.addEventListener('keydown', e=>{
  switch(e.key){
    case ' ': e.preventDefault(); spDown=true; cv.style.cursor='grab'; break;
    case 'r': case 'R': if(!e.ctrlKey&&!e.metaKey){resetView();sched();} break;
    case 'g': case 'G': showGrid=!showGrid; sched(); toast('Grid '+(showGrid?'on':'off'),'inf',500); break;
    case 'Enter': placeAt(lastBX,lastBY); break;
    case '+': case '=': zoomAt(cv.width/2,cv.height/2,1); sched(); break;
    case '-': case '_': zoomAt(cv.width/2,cv.height/2,-1); sched(); break;
  }
});
window.addEventListener('keyup', e=>{
  if(e.key===' '){ spDown=false; cv.style.cursor=panning?'grabbing':'crosshair'; }
});

// ─── Zoom buttons ────────────────────────────────────────
function addZbtn(id, dir){
  const el=document.getElementById(id);
  const fn=()=>{ if(dir===0){resetView();sched();}else zoomCenter(dir); };
  el.addEventListener('click', fn);
  el.addEventListener('touchend', e=>{ e.preventDefault(); fn(); },{passive:false});
}
addZbtn('zin',   1);
addZbtn('zout', -1);
addZbtn('zrst',  0);

// ─── Place button ────────────────────────────────────────
pbtn.addEventListener('click', ()=>placeAt(lastBX,lastBY));
pbtn.addEventListener('touchend', e=>{ e.preventDefault(); placeAt(lastBX,lastBY); },{passive:false});

// ─── Help ────────────────────────────────────────────────
hbtn.addEventListener('click', e=>{ e.stopPropagation(); hpanel.classList.toggle('on'); });
document.addEventListener('click', e=>{
  if(!hpanel.contains(e.target)&&e.target!==hbtn) hpanel.classList.remove('on');
});

// ─── Toast ───────────────────────────────────────────────
function toast(msg, type='inf', ms=1500){
  const t=document.createElement('div');
  t.className='tt '+type; t.textContent=msg;
  document.getElementById('tc').appendChild(t);
  setTimeout(()=>{ t.style.transition='opacity .2s'; t.style.opacity='0'; setTimeout(()=>t.remove(),220); },ms);
}

// ─── Progress ────────────────────────────────────────────
function prog(p, msg){ lb.style.width=p+'%'; if(msg) ls.textContent=msg; }

// ─── Socket.io ───────────────────────────────────────────
const socket=io({
  transports:['websocket','polling'],
  reconnection:true,
  reconnectionAttempts:10,
  reconnectionDelay:1000,
  timeout:20000,
});

socket.on('connect',()=>{
  connBadge.className='ok'; connBadge.textContent='● Online';
  prog(20,'Connected…'); toast('Connected!','ok',900);
});
socket.on('disconnect',()=>{
  connBadge.className='bad'; connBadge.textContent='● Offline';
  toast('Disconnected','err');
});
socket.on('connect_error',()=>{
  connBadge.className='mid'; connBadge.textContent='● Reconnecting…';
});
socket.on('reconnect', ()=>toast('Reconnected!','ok',900));

socket.on('board:meta', ()=>prog(30,'Metadata…'));

socket.on('board:load_via_rest', async({url})=>{
  try{
    prog(35,'Downloading…');
    const res=await fetch(url);
    if(!res.ok) throw new Error('HTTP '+res.status);
    const buf=await res.arrayBuffer();
    prog(65,'Decompressing…');
    const rgb=pako.inflate(new Uint8Array(buf));
    prog(82,'Rendering…');
    initBoard(); loadFull(rgb);
    ready=true; resetView(); sched();
    prog(100,'Ready!');
    setTimeout(()=>{ ldDiv.classList.add('out'); setTimeout(()=>ldDiv.style.display='none',450); },300);
    toast('Tap to place! 🎨','ok',1800);
  }catch(err){
    ls.textContent='Error: '+err.message;
    toast('Failed: '+err.message,'err',4000);
  }
});

socket.on('pixel:update',({x,y,r,g,b})=>{
  if(!ready) return;
  writePixel(x,y,r,g,b);
});

socket.on('pixel:accepted',({x,y,r,g,b,cooldownMs})=>{
  writePixel(x,y,r,g,b);
  startCooldown(cooldownMs); // запускаем игровой кулдаун 1 секунда
});

socket.on('pixel:rejected',({reason,remaining})=>{
  if(reason==='cooldown'){
    toast(`Wait ${(remaining/1000).toFixed(1)}s`,'err',700);
    if(!onCD) startCooldown(remaining);
  } else {
    toast('Rejected: '+reason,'err',2000);
  }
});

socket.on('stats:online', n=>{ hon.textContent=n; });

// ─── Init ────────────────────────────────────────────────
buildPalette();
setColor(color);
ctx.fillStyle='#1a1a26';
ctx.fillRect(0,0,cv.width,cv.height);
</script>
